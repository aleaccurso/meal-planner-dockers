services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: meal-planner-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_PORT: ${DB_PORT}
    ports:
      - "${DB_PORT}:5432"
    env_file:
      - .env
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - mealplanner_backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      secrets:
        - github_token
        - github_username
      network: host
    env_file:
      - .env
    container_name: meal-planner-backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      INSTANCE_NAME: meal-planner-db
      PROJECT_ID: ${PROJECT_ID}
      DRIVER_NAME: ${DRIVER_NAME}
      JWT_SECRET: ${JWT_SECRET}
      DB_DUMPS_FOLDER: ${DB_DUMPS_FOLDER}
      USERS_AVATAR_FOLDER: ${USERS_AVATAR_FOLDER}
      RECIPES_IMAGES_FOLDER: ${RECIPES_IMAGES_FOLDER}
      AUTH_CONFIG_PATH: /app/auth-config.json
    ports:
      - "${BACKEND_PORT}:8010"
    volumes:
      - ${AUTH_CONFIG_PATH:-./auth-config.json}:/app/auth-config.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mealplanner_backend_network
      - mealplanner_app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      secrets:
        - github_token
        - github_username
      args:
        VITE_APP_API_BASE_URL: ${API_BASE_URL:-/api}
        VITE_APP_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
        VITE_APP_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
        VITE_APP_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        VITE_APP_FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
        VITE_APP_FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
        VITE_APP_FIREBASE_APP_ID: ${FIREBASE_APP_ID}
        VITE_APP_USERS_AVATAR_FOLDER: ${USERS_AVATAR_FOLDER}
        VITE_APP_RECIPES_IMAGES_FOLDER: ${RECIPES_IMAGES_FOLDER}
      network: host
    env_file:
      - .env
    container_name: meal-planner-frontend
    environment:
      VITE_APP_BACKEND_HOST: localhost
      VITE_APP_BACKEND_PORT: 8010
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mealplanner_app_network

secrets:
  github_token:
    environment: GITHUB_TOKEN
  github_username:
    environment: GITHUB_USERNAME

volumes:
  mealplanner_db_data:

networks:
  mealplanner_backend_network:
    driver: bridge
  mealplanner_app_network:
    driver: bridge
