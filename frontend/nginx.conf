server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Runtime env config must never be cached
    location = /env-config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets (check these first)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to backend (preserve /api prefix)
    # VITE_APP_BACKEND_HOST and VITE_APP_BACKEND_PORT are substituted at runtime via envsubst.
    #
    # The upstream is assigned to a variable (rather than used as a literal in
    # proxy_pass) so nginx re-resolves it via the `resolver` directive on every
    # request instead of caching the IP once at worker startup. Docker's
    # embedded DNS (127.0.0.11) hands out a new IP whenever the backend
    # container is recreated independently of frontend (e.g. a NAS rebuild of
    # just the backend service, or a crash-restart) - with a literal hostname,
    # nginx would keep sending traffic to the old, now-dead IP and requests
    # would hang until timeout instead of following the container to its new address.
    # NOTE: once proxy_pass's target is a variable, nginx stops doing the
    # normal "replace matched location prefix with proxy_pass's URI" rewrite -
    # so the full path+query must be forwarded explicitly via $request_uri
    # instead of appending a literal /api/ suffix (verified: the latter
    # collapses every request down to a bare /api/, silently dropping the rest
    # of the path).
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream "http://${VITE_APP_BACKEND_HOST}:${VITE_APP_BACKEND_PORT}";

    location /api/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Error handling and timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Logging for debugging
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log;
    }

    # Also handle /api without trailing slash
    location = /api {
        return 301 /api/;
    }

    # Serve static files and SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

